name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Checkout code 
      uses: actions/checkout@v4 
      
    - uses: actions/setup-node@v6
      
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag 286668306968.dkr.ecr.us-east-1.amazonaws.com/simple/nginx:${{ github.sha }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: push the image
      run: docker push 286668306968.dkr.ecr.us-east-1.amazonaws.com/simple/nginx:${{ github.sha }}

    - name: Update image in manifest 
      run: | 
        yq eval -i '.spec.template.spec.containers[0].image = "286668306968.dkr.ecr.us-east-1.amazonaws.com/simple/nginx:433788aba81deca57ab8a5569eb6ccfe10c17006"' ./manifests/deploy.yaml
        git config --global user.name "github-actions[bot]" 
        git config --global user.email "github-actions[bot]@users.noreply.github.com" 
        git add ./k8s/backend-deploy.yaml
        git commit -m "updating the latest image" || echo "No changes to commit" 

      
    - name: Set up kind cluster 
      run: kind create cluster --name kind --wait 60s

    - name: Build Backend Image
      run: docker build -t backend:latest ./backend

    - name: Build Frontend Image
      run: docker build -t frontend:latest ./frontend

    - name: Load Images into Kind
      run: |
        kind load docker-image backend:latest
        kind load docker-image frontend:latest

    - name: Apply Kubernetes Manifests
      run: |
        kubectl apply -f k8s/backend-deploy.yaml
        kubectl apply -f k8s/frontend-deploy.yaml

    
    - name: Verify Deployment
      run: kubectl get pods
      
    - name: Rollout restart
      run: kubectl rollout restart deployment backend-deployment

